<div class="summary-card">

  <h3>Resumen del pedido</h3>

  <div class="items">

    <div class="item" *ngFor="let item of cartService.items()">
      
      <div class="left">
        <img [src]="item.image" alt="product" />
        <div>
          <p class="name">{{ item.name }}</p>
          <p class="qty">Cantidad: {{ item.qty }}</p>
        </div>
      </div>

      <p class="price">
        ${{ item.price * item.qty }}
      </p>

    </div>

  </div>

  <div class="divider"></div>

  <div class="totals">
    <div class="row">
      <span>Subtotal</span>
      <span>${{ cartService.total() }}</span>
    </div>

    <div class="row total">
      <span>Total</span>
      <span>${{ cartService.total() }}</span>
    </div>
  </div>

</div>
